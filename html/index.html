<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link href="css/main.css" rel="stylesheet">
</head>

<body>

    <img src="lion.png" class="profile">
    <h3 class="title">Harry</h3>
    <p class="content">Front-end Developer</p>
    <div class="box">
        <p>안녕하세요 개발자입니다</p>
    </div>

    <progress value="0.7" style="margin: 30px;"></progress>

    <style>
       progress {
            -webkit-appearance: none;
            appearance: none;
        }

        progress::-webkit-progress-bar {
            background-color: white;
            border-radius: 20px;
            height: 50px;
            padding: 8px;
            box-shadow: inset 0 5px 7px rgb(214, 218, 221);
        }

        progress::-webkit-progress-value {
            background-color: rgb(196, 242, 252);
            border-radius: 15px;
            box-shadow: inset 0 -5px 10px rgb(137, 199, 246)
        }
    </style>

</body>
